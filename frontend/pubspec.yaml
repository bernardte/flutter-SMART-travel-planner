name: frontend
description: AI-powered SMART Travel Planner mobile app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client (replaces Axios)
  dio: ^5.4.3+1

  # Environment variables
  flutter_dotenv: ^5.1.0

  shared_preferences: ^2.3.2

  # State management (replaces Zustand)
  flutter_riverpod: ^2.5.1

  # BLoC state management
  flutter_bloc: ^8.1.6

  # Service locator for dependency injection
  get_it: ^7.6.0

  # Navigation (replaces React Router)
  go_router: ^13.2.4

  # Secure token storage (replaces cookie auth)
  flutter_secure_storage: ^9.2.2

  # Image picking + uploading (replaces <input type="file">)
  image_picker: ^1.1.2

  # Cached network images
  cached_network_image: ^3.3.1

  # JSON serialization helpers
  json_annotation: ^4.9.0

  # Maps (replaces react-leaflet)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Date formatting
  intl: ^0.19.0

  # HTTP multi-part form (for file uploads)
  http_parser: ^4.0.2

  # URL launcher
  url_launcher: ^6.2.6

  # Share functionality
  share_plus: ^9.0.0

  cupertino_icons: ^1.0.8
  
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - .env